<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>大甲媽遶境空氣污染分析</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background-color: #f9f9f9; }
        .container { background: white; padding: 20px; border-radius: 10px; shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .chart-box { width: 100%; height: 400px; margin-top: 20px; }
        h1 { color: #d32f2f; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>大甲媽遶境數據分析</h1>
    <p>如果能看到下方的圖表，代表連線正常！</p>
    
    <div class="chart-box">
        <canvas id="myChart"></canvas>
    </div>
</div>

<script>
    // 檢查 Chart.js 是否載入成功
    if (typeof Chart === 'undefined') {
        document.body.innerHTML += '<p style="color:red">錯誤：無法從網路載入圖表套件，請檢查網路連線。</p>';
    } else {
        const ctx = document.getElementById('myChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['4/1', '4/4 (起駕)', '4/8 (高峰)', '4/13 (回鑾)', '4/15'],
                datasets: [{
                    label: 'PM2.5 趨勢',
                    data: [24, 28, 38, 27, 24],
                    borderColor: 'rgb(211, 47, 47)',
                    tension: 0.1,
                    fill: false
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false
            }
        });
    }
</script>

</body>
</html>
