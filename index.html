<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大甲媽遶境空氣污染分析</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* 基礎樣式設定 */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; margin: 0; background-color: #f8f9fa; color: #333; }
        
        /* 導覽列 */
        nav { background: #d32f2f; color: white; padding: 1rem; position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; }
        nav a { color: white; text-decoration: none; margin-left: 15px; font-weight: bold; }
        
        .container { max-width: 1000px; margin: 20px auto; padding: 20px; }
        
        /* 區塊樣式 */
        section { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 30px; }
        h2 { color: #d32f2f; border-left: 5px solid #d32f2f; padding-left: 10px; }

        /* 數據卡片 */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .card { background: #fff5f5; padding: 20px; border-radius: 8px; text-align: center; border: 1px solid #ffcdd2; }
        .card h3 { margin: 0; font-size: 0.9rem; color: #757575; }
        .card p { margin: 10px 0 0; font-size: 1.5rem; font-weight: bold; color: #d32f2f; }

        .chart-container { position: relative; height: 400px; width: 100%; }
    </style>
</head>
<body>

<nav>
    <div style="font-size: 1.2rem;">媽祖遶境數據監測</div>
    <div>
        <a href="#intro">簡介</a>
        <a href="#trend">污染趨勢</a>
        <a href="#comparison">前後比較</a>
        <a href="#conclusion">結論</a>
    </div>
</nav>

<div class="container">
    
    <section id="intro">
        <h1>大甲媽遶境空氣污染分析</h1>
        <p>本研究分析 2025 年大甲媽祖遶境期間（4/4 - 4/13）對台中大甲及周邊地區空氣品質之影響。</p>
        
        <div class="grid">
            <div class="card">
                <h3>遶境前平均</h3>
                <p>24 μg/m³</p>
            </div>
            <div class="card">
                <h3>遶境期間平均</h3>
                <p>33 μg/m³</p>
            </div>
            <div class="card">
                <h3>最高峰 (4/8)</h3>
                <p>38 μg/m³</p>
            </div>
        </div>
    </section>

    <section id="trend">
        <h2>PM2.5 時間序列分析</h2>
        <p>觀察 4/1 至 4/15 的濃度變化，明顯看出起駕後污染上升趨勢。</p>
        <div class="chart-container">
            <canvas id="lineChart"></canvas>
        </div>
    </section>

    <section id="comparison">
        <h2>活動階段對比</h2>
        <div class="chart-container">
            <canvas id="barChart"></canvas>
        </div>
    </section>

</div>

<script>
    // --- 1. 折線圖 (時間序列) ---
    const lineCtx = document.getElementById('lineChart').getContext('2d');
    new Chart(lineCtx, {
        type: 'line',
        data: {
            labels: ['4/1', '4/3', '4/4 (起駕)', '4/6', '4/8 (祝壽)', '4/10', '4/13 (回鑾)', '4/15'],
            datasets: [{
                label: 'PM2.5 濃度',
                data: [22, 25, 28, 32, 38, 34, 27, 24],
                borderColor: '#d32f2f',
                backgroundColor: 'rgba(211, 47, 47, 0.1)',
                fill: true,
                tension: 0.3
            }]
        },
        options: { responsive: true, maintainAspectRatio: false }
    });

    // --- 2. 長條圖 (前後比較) ---
    const barCtx = document.getElementById('barChart').getContext('2d');
    new Chart(barCtx, {
        type: 'bar',
        data: {
            labels: ['遶境前', '遶境中', '遶境後'],
            datasets: [{
                label: '平均 PM2.5 (μg/m³)',
                data: [24, 33, 26],
                backgroundColor: ['#4caf50', '#f44336', '#2196f3']
            }]
        },
        options: { responsive: true, maintainAspectRatio: false }
    });
</script>

</body>
</html>
