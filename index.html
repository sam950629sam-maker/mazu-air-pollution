<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<script>
// 設定要分析的目標
const targetSite = "大甲"; // 你可以改成 "台中" 或其他測站
const targetItem = "細懸浮微粒"; // 即 PM2.5

async function main() {
    try {
        // 1. 抓取 4 月份的資料 (遶境月份)
        // 這裡的檔名必須跟你在 GitHub 上傳的一模一樣
        const fileName = '空氣品質監測月值 (2025-04).csv';
        const response = await fetch(fileName);
        const csvText = await response.text();

        // 2. 解析 CSV
        Papa.parse(csvText, {
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                const rawData = results.data;

                // 3. 過濾出大甲站的 PM2.5
                // 注意：有些檔案 itemname 可能叫 "PM2.5" 或 "細懸浮微粒"
                const filteredData = rawData.filter(row => 
                    row.sitename === targetSite && 
                    (row.itemname === targetItem || row.itemengname === "PM2.5")
                );

                if (filteredData.length === 0) {
                    console.error("找不到大甲站的數據，請檢查站名是否正確");
                    return;
                }

                // 4. 準備圖表標籤 (X軸為月份，Y軸為濃度)
                // 註：因為這是「月值」檔案，通常只有一筆平均值
                // 若要看「每日」變化，建議上傳「日資料」或「小時資料」
                const labels = filteredData.map(d => d.monitormonth);
                const values = filteredData.map(d => parseFloat(d.concentration));

                renderChart(labels, values);
            }
        });
    } catch (error) {
        console.error("資料讀取錯誤:", error);
    }
}

function renderChart(labels, values) {
    const ctx = document.getElementById('lineChart').getContext('2d');
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: `${targetSite}站 PM2.5 月平均濃度`,
                data: values,
                backgroundColor: 'rgba(211, 47, 47, 0.7)',
                borderColor: '#d32f2f',
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            scales: { y: { beginAtZero: true } }
        }
    });
}

// 啟動程式
main();
</script>
